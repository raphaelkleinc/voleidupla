<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏐 Vôlei</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">

<!-- ====================================================
     FIREBASE CONFIG — substitua pelos seus dados
     Firebase Console → Configurações do projeto → Seus apps
     ==================================================== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, remove, push, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyBaHMewuyReIt9U72PEIwA7iipg1ZTBIFE",
    authDomain:        "calendario-amelia-2202c.firebaseapp.com",
    databaseURL:       "https://calendario-amelia-2202c-default-rtdb.firebaseio.com",
    projectId:         "calendario-amelia-2202c",
    storageBucket:     "calendario-amelia-2202c.firebasestorage.app",
    messagingSenderId: "329381802500",
    appId:             "1:329381802500:web:9e6d1b7c9110478974fb51"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  window._vApp = { players: [], venues: [], games: [] };

  // ── listeners em tempo real (igual ao Amélia) ─────────
  onValue(ref(db, 'volei/players'), snap => {
    const val = snap.val() || {};
    window._vApp.players = Object.entries(val)
      .map(([id, d]) => ({ id, ...d }))
      .sort((a, b) => a.name.localeCompare(b.name));
    render();
  });

  onValue(ref(db, 'volei/venues'), snap => {
    const val = snap.val() || {};
    window._vApp.venues = Object.entries(val)
      .map(([id, d]) => ({ id, ...d }))
      .sort((a, b) => a.name.localeCompare(b.name));
    render();
  });

  onValue(ref(db, 'volei/games'), snap => {
    const val = snap.val() || {};
    window._vApp.games = Object.entries(val)
      .map(([id, d]) => ({ id, ...d }))
      .sort((a, b) => a.date.localeCompare(b.date));
    render();
  });

  // ── helpers expostos ao window ────────────────────────
  window._fb = {
    addPlayer:    (data)      => push(ref(db, 'volei/players'), data),
    removePlayer: (id)        => remove(ref(db, `volei/players/${id}`)),
    addVenue:     (data)      => push(ref(db, 'volei/venues'), data),
    removeVenue:  (id)        => remove(ref(db, `volei/venues/${id}`)),
    addGame:      (data)      => push(ref(db, 'volei/games'), data),
    removeGame:   (id)        => remove(ref(db, `volei/games/${id}`)),
    updateGame:   (id, data)  => update(ref(db, `volei/games/${id}`), data),
  };

// ── constantes ────────────────────────────────────────────────
const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                   'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const today = new Date();
let currentYear  = today.getFullYear();
let currentMonth = today.getMonth();
let expandedGame = null;

// ── toast ──────────────────────────────────────────────────────
function showToast(msg, ms = 1800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

// ── navegação de mês ──────────────────────────────────────────
function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  render();
}

// ── modais ────────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-bg').forEach(m =>
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); })
);

// ── abas ──────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) =>
    b.classList.toggle('active', ['players','venues'][i] === tab)
  );
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
}

// ── formatar data ─────────────────────────────────────────────
function fmtDate(dateStr) {
  const [y, m, d] = dateStr.split('-');
  return `${d}/${m}/${y}`;
}

// ══════════════════════════════════════════════════════════════
//  RENDER PRINCIPAL
// ══════════════════════════════════════════════════════════════
function render() {
  const { players, venues, games } = window._vApp || { players:[], venues:[], games:[] };

  // label do mês
  document.getElementById('monthLabel').textContent =
    `${MONTHS_PT[currentMonth]} ${currentYear}`;

  // filtrar jogos do mês atual
  const monthGames = games.filter(g => {
    const [y, m] = g.date.split('-');
    return parseInt(y) === currentYear && parseInt(m) - 1 === currentMonth;
  });

  // select de quadras no modal
  const gVenueSel = document.getElementById('gVenue');
  gVenueSel.innerHTML = '<option value="">Selecionar quadra...</option>' +
    venues.map(v => `<option value="${v.id}">${v.name}</option>`).join('');

  // lista de jogadores no modal
  const plEl = document.getElementById('playersList');
  plEl.innerHTML = players.length
    ? players.map(p => `
        <div class="list-item">
          <div>
            <div class="list-item-name">${esc(p.name)}</div>
            <div class="list-item-meta">
              ${p.contact ? '📱 ' + esc(p.contact) : ''}
              ${p.pix     ? '&nbsp;· PIX: ' + esc(p.pix) : ''}
            </div>
          </div>
          <button class="btn btn-sm btn-danger" onclick="removePlayer('${p.id}')">
            <i class="ti ti-trash"></i>
          </button>
        </div>`).join('')
    : '<p style="color:var(--text3);font-size:13px;text-align:center;padding:.5rem">Nenhum jogador ainda</p>';

  // lista de quadras no modal
  const vEl = document.getElementById('venuesList');
  vEl.innerHTML = venues.length
    ? venues.map(v => `
        <div class="list-item">
          <div>
            <div class="list-item-name">${esc(v.name)}</div>
            <div class="list-item-meta">${esc(v.address || '')}</div>
          </div>
          <button class="btn btn-sm btn-danger" onclick="removeVenue('${v.id}')">
            <i class="ti ti-trash"></i>
          </button>
        </div>`).join('')
    : '<p style="color:var(--text3);font-size:13px;text-align:center;padding:.5rem">Nenhuma quadra ainda</p>';

  // lista de jogos
  const listEl = document.getElementById('gameList');
  if (!monthGames.length) {
    listEl.innerHTML = `
      <div class="empty-month">
        <i class="ti ti-calendar-off"></i>
        <p>Nenhum jogo em ${MONTHS_PT[currentMonth]}</p>
        <p style="font-size:12px;margin-top:.5rem;color:var(--text3)">
          Clique em "+ Novo jogo" para marcar
        </p>
      </div>`;
    return;
  }

  listEl.innerHTML = monthGames.map(g => renderGame(g, players, venues)).join('');
  // após rebuild do DOM, restaurar input de custo e renderizar split
  if (expandedGame) {
    const g = monthGames.find(x => x.id === expandedGame);
    if (g) {
      const inp = document.getElementById('cost-input-' + expandedGame);
      if (inp && document.activeElement !== inp) {
        inp.value = g.cost ? fmtBRL(parseFloat(g.cost)) : '';
      }
      renderSplit(g);
    }
  }
}

function renderGame(g, players, venues) {
  const isExp  = expandedGame === g.id;
  const confirmed = g.confirmed || [];
  const venue  = venues.find(v => v.id === g.venueId);
  const payer  = players.find(p => p.id === g.payerId);

  // link da quadra
  const addr = venue ? venue.address : '';
  const isLink = addr && (addr.startsWith('http://') || addr.startsWith('https://'));
  const venueLabel = isLink
    ? `<a href="${esc(addr)}" target="_blank" onclick="event.stopPropagation()">${esc(g.venueName)} <i class="ti ti-external-link" style="font-size:11px"></i></a>`
    : esc(g.venueName || '');

  // badges
  const confirmedCount = confirmed.length;
  let badges = `<span class="badge badge-blue"><i class="ti ti-users" style="font-size:10px"></i> ${confirmedCount} confirmado${confirmedCount !== 1 ? 's' : ''}</span>`;
  if (payer) badges += `<span class="badge badge-amber"><i class="ti ti-credit-card" style="font-size:10px"></i> ${esc(payer.name)} pagou</span>`;
  if (g.cost) badges += `<span class="badge badge-green">R$ ${parseFloat(g.cost).toFixed(2)}</span>`;

  // detalhe expandido
  let detail = '';
  if (isExp) {
    const { players: allPlayers } = window._vApp;

    const presenceChips = allPlayers.map(p => {
      const ok = confirmed.includes(p.id);
      return `<div class="player-chip${ok ? ' confirmed' : ''}"
                   onclick="event.stopPropagation(); toggleConfirm('${g.id}', '${p.id}')">
                <i class="ti ti-${ok ? 'check' : 'plus'}" style="font-size:11px"></i>
                ${esc(p.name)}
              </div>`;
    }).join('');

    const payerChips = allPlayers.map(p => {
      const isPayer = g.payerId === p.id;
      return `<div class="player-chip${isPayer ? ' payer' : ''}"
                   onclick="event.stopPropagation(); setPayer('${g.id}', '${p.id}')">
                <i class="ti ti-${isPayer ? 'star' : 'user'}" style="font-size:11px"></i>
                ${esc(p.name)}
              </div>`;
    }).join('');

    detail = `
      <div class="game-detail open">
        <div class="detail-section">
          <div class="detail-label">Confirmar presença</div>
          <div class="player-chips">${presenceChips || '<span style="color:var(--text3);font-size:12px">Cadastre jogadores primeiro</span>'}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">Quem pagou a quadra?</div>
          <div class="player-chips">${payerChips || '<span style="color:var(--text3);font-size:12px">Cadastre jogadores primeiro</span>'}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">Valor total da quadra (R$)</div>
          <input class="cost-input" type="text" inputmode="numeric" placeholder="0,00"
                 id="cost-input-${g.id}"
                 value="${g.cost ? fmtBRL(parseFloat(g.cost)) : ''}"
                 onclick="event.stopPropagation()"
                 oninput="event.stopPropagation(); onCostInput(event, '${g.id}')"
                 onblur="saveCost('${g.id}')">
          <div class="split-result" id="split-${g.id}"></div>
        </div>
        <div class="copy-btns">
          <button class="btn btn-sm" onclick="event.stopPropagation(); openCopy('${g.id}','game')">
            <i class="ti ti-brand-whatsapp"></i> Resumo do jogo
          </button>
          <button class="btn btn-sm" onclick="event.stopPropagation(); openCopy('${g.id}','payment')">
            <i class="ti ti-receipt"></i> Divisão do valor
          </button>
        </div>
      </div>`;
  }

  return `
    <div class="game-card${isExp ? ' expanded' : ''}" onclick="toggleExpand('${g.id}')">
      <div class="game-header">
        <div class="game-info">
          <div class="game-date-line">
            <svg class="vball" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <clipPath id="ballclip">
                  <circle cx="50" cy="50" r="47"/>
                </clipPath>
              </defs>
              <!-- painel azul esquerdo -->
              <path d="M50,3 A47,47 0 0,0 3,50 A47,47 0 0,0 50,97 Q20,75 22,50 Q20,25 50,3 Z" fill="#1a5fa8" clip-path="url(#ballclip)"/>
              <!-- painel azul direito -->
              <path d="M50,3 A47,47 0 0,1 97,50 A47,47 0 0,1 50,97 Q80,75 78,50 Q80,25 50,3 Z" fill="#1a5fa8" clip-path="url(#ballclip)"/>
              <!-- painel amarelo central -->
              <path d="M50,3 Q80,25 78,50 Q80,75 50,97 Q20,75 22,50 Q20,25 50,3 Z" fill="#f5e030" clip-path="url(#ballclip)"/>
              <!-- faixa branca esquerda -->
              <path d="M22,50 Q20,25 50,3 Q35,25 36,50 Q35,75 50,97 Q20,75 22,50 Z" fill="white" opacity="0.9" clip-path="url(#ballclip)"/>
              <!-- faixa branca direita -->
              <path d="M78,50 Q80,25 50,3 Q65,25 64,50 Q65,75 50,97 Q80,75 78,50 Z" fill="white" opacity="0.9" clip-path="url(#ballclip)"/>
              <!-- borda da bola -->
              <circle cx="50" cy="50" r="47" fill="none" stroke="#b8970a" stroke-width="2"/>
            </svg>
            Jogo ${fmtDate(g.date)}
          </div>
          <div class="game-meta">
            <i class="ti ti-clock" style="font-size:12px"></i> ${g.start} às ${g.end}
            &nbsp;·&nbsp;
            <i class="ti ti-map-pin" style="font-size:12px"></i> ${venueLabel}
          </div>
          <div class="game-badges">${badges}</div>
        </div>
        <div class="game-actions-row" onclick="event.stopPropagation()">
          <button class="btn btn-sm" style="color:var(--text2)" onclick="toggleExpand('${g.id}')">
            <i class="ti ti-chevron-${isExp ? 'up' : 'down'}"></i>
          </button>
          <button class="btn btn-sm btn-danger" onclick="removeGame('${g.id}')">
            <i class="ti ti-trash"></i>
          </button>
        </div>
      </div>
      ${detail}
    </div>`;
}

// ══════════════════════════════════════════════════════════════
//  AÇÕES — delegam ao Firebase via window._fb
// ══════════════════════════════════════════════════════════════

function addPlayer() {
  const name    = document.getElementById('pName').value.trim();
  const contact = document.getElementById('pContact').value.trim();
  const pix     = document.getElementById('pPix').value.trim();
  if (!name) return showToast('Informe o nome do jogador');
  window._fb.addPlayer({ name, contact, pix })
    .then(() => {
      document.getElementById('pName').value    = '';
      document.getElementById('pContact').value = '';
      document.getElementById('pPix').value     = '';
      showToast('Jogador adicionado ✓');
    });
}

function removePlayer(id) {
  if (!confirm('Remover este jogador?')) return;
  window._fb.removePlayer(id);
}

function addVenue() {
  const name    = document.getElementById('vName').value.trim();
  const address = document.getElementById('vAddress').value.trim();
  if (!name) return showToast('Informe o nome da quadra');
  window._fb.addVenue({ name, address })
    .then(() => {
      document.getElementById('vName').value    = '';
      document.getElementById('vAddress').value = '';
      showToast('Quadra adicionada ✓');
    });
}

function removeVenue(id) {
  if (!confirm('Remover esta quadra?')) return;
  window._fb.removeVenue(id);
}

function addGame() {
  const date    = document.getElementById('gDate').value;
  const start   = document.getElementById('gStart').value;
  const end     = document.getElementById('gEnd').value;
  const venueId = document.getElementById('gVenue').value;
  if (!date)    return showToast('Selecione a data');
  if (!venueId) return showToast('Selecione a quadra');
  const venue   = window._vApp.venues.find(v => v.id === venueId);
  window._fb.addGame({
    date, start, end,
    venueId,
    venueName:    venue ? venue.name    : '',
    venueAddress: venue ? venue.address : '',
    confirmed: [],
    payerId:   null,
    cost:      ''
  }).then(() => {
    closeModal('addGameModal');
    // navegar pro mês do jogo
    const [y, m] = date.split('-');
    currentYear  = parseInt(y);
    currentMonth = parseInt(m) - 1;
    showToast('Jogo marcado ✓');
    render();
  });
}

function removeGame(id) {
  if (!confirm('Excluir este jogo?')) return;
  if (expandedGame === id) expandedGame = null;
  window._fb.removeGame(id).then(() => showToast('Jogo removido'));
}

function toggleExpand(id) {
  expandedGame = expandedGame === id ? null : id;
  render();
}

function toggleConfirm(gameId, playerId) {
  const g = window._vApp.games.find(x => x.id === gameId); if (!g) return;
  const arr = [...(g.confirmed || [])];
  const idx = arr.indexOf(playerId);
  if (idx >= 0) arr.splice(idx, 1); else arr.push(playerId);
  window._fb.updateGame(gameId, { confirmed: arr });
}

function setPayer(gameId, playerId) {
  const g = window._vApp.games.find(x => x.id === gameId); if (!g) return;
  const newPayer = g.payerId === playerId ? null : playerId;
  g.payerId = newPayer;
  window._fb.updateGame(gameId, { payerId: newPayer });
  renderSplit(g);
}

function togglePaid(gameId, playerId) {
  const g = window._vApp.games.find(x => x.id === gameId); if (!g) return;
  const paid = [...(g.paid || [])];
  const idx = paid.indexOf(playerId);
  if (idx >= 0) paid.splice(idx, 1); else paid.push(playerId);
  g.paid = paid;
  window._fb.updateGame(gameId, { paid });
  renderSplit(g);
}

function fmtBRL(n) {
  return n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function parseBRL(str) {
  // aceita "160", "160,00", "1.600,00"
  return parseFloat(String(str).replace(/\./g, '').replace(',', '.')) || 0;
}

function onCostInput(event, gameId) {
  // atualiza split em tempo real sem sair do input
  const raw = event.target.value;
  const val = parseBRL(raw);
  const g = window._vApp.games.find(x => x.id === gameId);
  if (g) { g.cost = val || ''; renderSplit(g); }
}

function saveCost(gameId) {
  // salva no Firebase só ao perder foco (onblur)
  const input = document.getElementById('cost-input-' + gameId);
  if (!input) return;
  const val = parseBRL(input.value);
  // formata o campo
  input.value = val ? fmtBRL(val) : '';
  window._fb.updateGame(gameId, { cost: val || '' });
  const g = window._vApp.games.find(x => x.id === gameId);
  if (g) { g.cost = val || ''; renderSplit(g); }
}

// ══════════════════════════════════════════════════════════════
//  DIVISÃO
// ══════════════════════════════════════════════════════════════
function renderSplit(g) {
  const el = document.getElementById('split-' + g.id);
  if (!el) return;
  const { players } = window._vApp;
  const cost      = parseFloat(g.cost) || 0;
  const confirmed = g.confirmed || [];
  if (!cost || !confirmed.length) {
    el.innerHTML = '<p style="color:var(--text3);font-size:12px">Informe o valor e confirme presenças para calcular.</p>';
    return;
  }
  const per   = cost / confirmed.length;
  const payer = players.find(p => p.id === g.payerId);
  el.innerHTML =
    `<div style="font-size:12px;color:var(--text2);margin-bottom:6px">
       R$ ${fmtBRL(cost)} ÷ ${confirmed.length} pessoas
       = <strong>R$ ${fmtBRL(per)} por pessoa</strong>
     </div>` +
    confirmed.map(pid => {
      const p       = players.find(x => x.id === pid);
      const isPayer = g.payerId === pid;
      const hasPaid = isPayer || (g.paid || []).includes(pid);
      const chip = isPayer
        ? '<i class="ti ti-check" style="color:var(--ok-text);font-size:18px"></i>'
        : `<span onclick="togglePaid('${g.id}','${pid}')" style="cursor:pointer;display:inline-flex;align-items:center;gap:5px">
             ${hasPaid
               ? '<i class="ti ti-check" style="color:var(--ok-text);font-size:18px"></i>'
               : '<span style="color:var(--text2)">R$ ' + fmtBRL(per) + '</span>'}
           </span>`;
      return `<div class="split-row">
        <span class="sname">${esc(p ? p.name : '?')}</span>
        <span class="sval">${chip}</span>
      </div>`;
    }).join('');
}

function renderBadges(gameId) {
  const g = window._vApp.games.find(x => x.id === gameId);
  if (!g) return;
  const { players } = window._vApp;
  const confirmed = g.confirmed || [];
  const payer = players.find(p => p.id === g.payerId);
  const card = document.querySelector('.game-card.expanded');
  if (!card) return;
  const badgesEl = card.querySelector('.game-badges');
  if (!badgesEl) return;
  let badges = `<span class="badge badge-blue"><i class="ti ti-users" style="font-size:10px"></i> ${confirmed.length} confirmado${confirmed.length !== 1 ? 's' : ''}</span>`;
  if (payer) badges += `<span class="badge badge-amber"><i class="ti ti-credit-card" style="font-size:10px"></i> ${esc(payer.name)} pagou</span>`;
  if (g.cost) badges += `<span class="badge badge-green">R$ ${fmtBRL(parseFloat(g.cost))}</span>`;
  badgesEl.innerHTML = badges;
}

// COPY PARA WHATSAPP
function openCopy(gameId, type) {
  const { players, venues } = window._vApp;
  const g = window._vApp.games.find(x => x.id === gameId);
  if (!g) return;

  const confirmedPlayers = (g.confirmed || [])
    .map(pid => players.find(p => p.id === pid)).filter(Boolean);
  const payer = players.find(p => p.id === g.payerId);
  const venue = venues.find(v => v.id === g.venueId);
  const cost  = parseFloat(g.cost) || 0;
  const per   = confirmedPlayers.length ? cost / confirmedPlayers.length : 0;

  let txt = '';

  if (type === 'game') {
    txt = `🏐 *JOGO DE VÔLEI*\n`
        + `📅 ${fmtDate(g.date)} — ${g.start} às ${g.end}\n`
        + `📍 ${g.venueName}`
        + (venue && venue.address ? `\n🗺 ${venue.address}` : '')
        + `\n\n✅ *Confirmados (${confirmedPlayers.length}):*\n`
        + (confirmedPlayers.length
            ? confirmedPlayers.map((p, i) => `${i + 1}. ${p.name}`).join('\n')
            : 'Ninguém ainda')
        + `\n\n👆 Confirme sua presença no link do grupo!`;

  } else if (type === 'payment') {
    txt = `💰 *DIVISÃO DA QUADRA*\n`
        + `📅 ${fmtDate(g.date)} — ${g.venueName}\n\n`
        + `💳 Total: R$ ${cost.toFixed(2)} ÷ ${confirmedPlayers.length} pessoas`
        + ` = *R$ ${per.toFixed(2)} por pessoa*\n`
        + (payer
            ? `\n🏦 *Pagar para: ${payer.name}*\n`
            + (payer.pix ? `PIX: \`${payer.pix}\`` : '')
            : '')
        + `\n\n📋 *Lista:*\n`
        + confirmedPlayers.map(p => {
            if (g.payerId === p.id) return `• ${p.name}: pagou a quadra 🏦`;
            const quitou = (g.paid || []).includes(p.id);
            return `• ${p.name}: R$ ${fmtBRL(per)}${quitou ? ' ✓ quitou' : ''}`;
          }).join('\n');
  }

  document.getElementById('copyText').value = txt;
  openModal('copyModal');
}

function doCopy() {
  const t = document.getElementById('copyText');
  t.select();
  try { document.execCommand('copy'); }
  catch { navigator.clipboard.writeText(t.value); }
  showToast('Copiado para a área de transferência ✓');
  document.getElementById('copyBtn').innerHTML = '<i class="ti ti-check"></i> Copiado!';
  setTimeout(() => {
    document.getElementById('copyBtn').innerHTML = '<i class="ti ti-copy"></i> Copiar';
  }, 1800);
}

// ── util ──────────────────────────────────────────────────────
function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
