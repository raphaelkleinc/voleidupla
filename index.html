<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏐 Dupla de Domingo</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#fffdf8; --bg2:#f5efe2; --bg3:#ede4d0;
  --text:#1f1a10; --text2:#7a6a50; --text3:#b0a080;
  --border:rgba(180,140,60,.18); --border2:rgba(180,140,60,.35);
  --radius-md:8px; --radius-lg:12px;
  --accent:#e86c1a; --accent-light:#fff0e6; --accent-bdr:rgba(232,108,26,.35);
  --cyan:#0891b2;   --cyan-light:#e0f7fc;   --cyan-bdr:rgba(8,145,178,.3);
  --info-bg:#e0f7fc;   --info-text:#0891b2;  --info-bdr:rgba(8,145,178,.3);
  --ok-bg:#eaf3de;     --ok-text:#3b6d11;    --ok-bdr:rgba(59,109,17,.3);
  --warn-bg:#fff0e6;   --warn-text:#c05010;  --warn-bdr:rgba(200,80,20,.3);
  --danger-bg:#fcebeb; --danger-text:#a32d2d;--danger-bdr:rgba(163,45,45,.3);
}
@media (prefers-color-scheme:dark) {
  :root {
    --bg:#1a1610; --bg2:#241e14; --bg3:#2e261a;
    --text:#f5ead0; --text2:#a8916a; --text3:#6b5a3a;
    --border:rgba(200,160,80,.15); --border2:rgba(200,160,80,.3);
    --accent:#f07830; --accent-light:#3a1f08; --accent-bdr:rgba(240,120,48,.3);
    --cyan:#22d3ee;   --cyan-light:#0c2a33;   --cyan-bdr:rgba(34,211,238,.25);
    --info-bg:#0c2a33;   --info-text:#22d3ee;
    --ok-bg:#1a3008;     --ok-text:#7ec44a;
    --warn-bg:#3a1f08;   --warn-text:#f07830;  --warn-bdr:rgba(240,120,48,.3);
    --danger-bg:#2a0a0a; --danger-text:#f08080;--danger-bdr:rgba(240,128,128,.3);
  }
}
body {
  font-family:system-ui,-apple-system,sans-serif;
  color:var(--text); font-size:14px; min-height:100vh;
  background-color:var(--bg3);
  position:relative;
}
body::before {
  content:'';
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image: url('https://raw.githubusercontent.com/raphaelkleinc/voleidupla/main/img/WaterMark.png');
  background-repeat: no-repeat;
  background-size: 90% auto;
  background-position: center 120px;
  opacity: 0.09;
}
.app { position:relative; z-index:1; }
.app { max-width:680px; margin:0 auto; padding-bottom:4rem; position:relative; z-index:1; }
.header {
  background:#1a0a2e;
  border-bottom:none;
  padding:0;
  position:sticky; top:0; z-index:100;
  overflow:hidden;
}
.header-bg {
  position:absolute; inset:0;
  background-image: url('https://raw.githubusercontent.com/raphaelkleinc/voleidupla/main/img/Header.png');
  background-size:cover; background-position:center 30%;
  z-index:0;
}
.header-bg::after {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(to bottom, rgba(20,5,40,.45) 0%, rgba(20,5,40,.15) 60%, rgba(20,5,40,.7) 100%);
}
.header-inner { padding:.75rem 1.25rem 0; position:relative; z-index:2; }
.header-wave { display:block; width:100%; height:32px; margin-top:-.5rem; position:relative; z-index:2; }
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:.75rem; }
.app-title { font-size:18px; font-weight:700; display:flex; align-items:center; gap:8px; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.25); }
.header-actions { display:flex; gap:8px; }
.month-nav { display:flex; align-items:center; justify-content:center; gap:1rem; }
.month-label { font-size:15px; font-weight:700; min-width:160px; text-align:center; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.25); }
.nav-btn { background:rgba(255,255,255,.2); border:none; cursor:pointer; color:#fff; font-size:18px; padding:4px 8px; border-radius:var(--radius-md); line-height:1; }
.nav-btn:hover { background:rgba(255,255,255,.35); }
.btn { background:rgba(255,255,255,.25); border:0.5px solid rgba(255,255,255,.5); border-radius:var(--radius-md); padding:6px 12px; font-size:13px; color:#fff; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:background .15s; font-family:inherit; }
.btn:hover { background:rgba(255,255,255,.4); }
.body .btn, .modal .btn, .split-result .btn, .copy-btns .btn, .game-actions-row .btn, .modal-actions .btn, .tab-bar .tab-btn { background:transparent; border-color:var(--border2); color:var(--text); }
.body .btn:hover, .modal .btn:hover, .copy-btns .btn:hover, .game-actions-row .btn:hover, .modal-actions .btn:hover { background:var(--bg2); }
.btn-sm { padding:4px 8px; font-size:12px; }
.btn-primary { background:rgba(255,255,255,.9); border-color:rgba(255,255,255,.9); color:var(--accent); font-weight:700; }
.btn-primary:hover { background:#fff; }
.body .btn-primary, .modal .btn-primary, .modal-actions .btn-primary { background:var(--accent); border-color:var(--accent-bdr); color:#fff; font-weight:600; }
.body .btn-primary:hover, .modal .btn-primary:hover, .modal-actions .btn-primary:hover { opacity:.88; }
.btn-danger { border-color:var(--danger-bdr); color:var(--danger-text); }
.btn-danger:hover { background:var(--danger-bg); }
.body { padding:1rem 1.25rem; }
.game-list { display:flex; flex-direction:column; gap:.75rem; }
.game-card { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:1rem 1.25rem; cursor:pointer; transition:border-color .15s; }
.game-card:hover { border-color:var(--border2); }
.game-card.expanded { border-color:var(--accent-bdr); border-left:3px solid var(--accent); }
.game-header { display:flex; align-items:flex-start; justify-content:space-between; gap:.5rem; }
.game-info { flex:1; min-width:0; }
.game-date-line { font-size:15px; font-weight:500; display:flex; align-items:center; gap:8px; }
.game-meta { font-size:13px; color:var(--text2); margin-top:4px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.game-meta a { color:var(--info-text); text-decoration:none; }
.game-meta a:hover { text-decoration:underline; }
.game-badges { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
.badge { font-size:11px; padding:2px 8px; border-radius:20px; font-weight:500; display:inline-flex; align-items:center; gap:4px; }
.badge-blue   { background:var(--info-bg);   color:var(--info-text); }
.badge-green  { background:var(--ok-bg);     color:var(--ok-text); }
.badge-amber  { background:var(--warn-bg);   color:var(--warn-text); }
.badge-gray   { background:var(--bg2);       color:var(--text2); }
.game-detail { margin-top:1rem; padding-top:1rem; border-top:0.5px solid var(--border); display:none; }
.game-detail.open { display:block; }
.detail-section { margin-bottom:1rem; }
.detail-label { font-size:11px; color:var(--text3); font-weight:500; text-transform:uppercase; letter-spacing:.05em; margin-bottom:.5rem; }
.player-list { background:var(--bg2); border:0.5px solid var(--border); border-radius:var(--radius-md); max-height:200px; overflow-y:auto; }
.player-row { display:flex; align-items:center; gap:10px; padding:8px 12px; border-bottom:0.5px solid var(--border); cursor:pointer; transition:background .12s; user-select:none; }
.player-row:last-child { border-bottom:none; }
.player-row:hover { background:var(--bg3); }
.player-row.confirmed { background:var(--ok-bg); }
.player-row.confirmed .player-row-name { color:var(--ok-text); font-weight:500; }
.player-row.payer { background:var(--warn-bg); }
.player-row.payer .player-row-name { color:var(--warn-text); font-weight:500; }
.player-row-check { width:18px; height:18px; border-radius:4px; border:1.5px solid var(--border2); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:11px; transition:all .12s; }
.player-row.confirmed .player-row-check { background:var(--ok-text); border-color:var(--ok-text); color:white; }
.player-row.payer .player-row-check { background:var(--warn-text); border-color:var(--warn-text); color:white; }
.player-row-name { font-size:13px; color:var(--text); flex:1; }
.cost-input { padding:7px 10px; border:0.5px solid var(--border2); border-radius:var(--radius-md); background:var(--bg2); color:var(--text); font-size:13px; width:180px; font-family:inherit; }
.split-result { background:var(--bg2); border-radius:var(--radius-md); padding:.75rem 1rem; font-size:13px; margin-top:.5rem; }
.split-row { display:flex; justify-content:space-between; align-items:center; padding:4px 0; border-bottom:0.5px solid var(--border); }
.split-row:last-child { border:none; }
.split-row .sname { color:var(--text2); }
.split-row .sval { font-weight:500; display:flex; align-items:center; }
.copy-btns { display:flex; gap:8px; flex-wrap:wrap; margin-top:.75rem; }
.game-actions-row { display:flex; gap:6px; align-items:center; flex-shrink:0; }
.empty-month { text-align:center; padding:3rem 1rem; color:var(--text2); }
.empty-month i { font-size:40px; margin-bottom:.75rem; display:block; color:var(--text3); }
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; align-items:center; justify-content:center; padding:1rem; }
.modal-bg.open { display:flex; }
.modal { background:var(--bg); border-radius:var(--radius-lg); padding:1.5rem; width:100%; max-width:420px; border:0.5px solid var(--border); max-height:90vh; overflow-y:auto; }
.modal h2 { font-size:16px; font-weight:500; margin-bottom:1rem; display:flex; align-items:center; gap:8px; }
.form-group { margin-bottom:.75rem; }
.form-group label { display:block; font-size:12px; color:var(--text2); margin-bottom:4px; font-weight:500; }
.form-group input,.form-group select,.form-group textarea { width:100%; padding:7px 10px; border:0.5px solid var(--border2); border-radius:var(--radius-md); background:var(--bg2); color:var(--text); font-size:13px; font-family:inherit; }
.form-group textarea { resize:vertical; min-height:60px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:.5rem; }
.modal-actions { display:flex; gap:8px; margin-top:1rem; justify-content:flex-end; }
.tab-bar { display:flex; gap:4px; background:var(--bg2); border-radius:var(--radius-md); padding:3px; margin-bottom:.75rem; }
.tab-btn { flex:1; padding:6px; font-size:12px; border:none; background:none; cursor:pointer; border-radius:6px; color:var(--text2); font-weight:500; font-family:inherit; transition:background .15s; }
.tab-btn.active { background:var(--bg); color:var(--text); }
.tab-content { display:none; }
.tab-content.active { display:block; }
.list-item { display:flex; align-items:center; justify-content:space-between; padding:7px 0; border-bottom:0.5px solid var(--border); }
.list-item:last-child { border:none; }
.list-item-name { font-size:14px; font-weight:500; }
.list-item-meta { font-size:12px; color:var(--text2); margin-top:2px; }
.list-scroll { max-height:200px; overflow-y:auto; }
.copy-area { width:100%; min-height:200px; padding:10px; border:0.5px solid var(--border2); border-radius:var(--radius-md); background:var(--bg2); color:var(--text); font-size:13px; font-family:inherit; resize:vertical; }
.toast { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%); background:var(--text); color:var(--bg); padding:8px 18px; border-radius:20px; font-size:13px; font-weight:500; opacity:0; transition:opacity .2s; pointer-events:none; z-index:999; white-space:nowrap; }
.toast.show { opacity:1; }
.sync-dot { width:7px; height:7px; border-radius:50%; background:var(--ok-text); display:inline-block; margin-left:6px; }
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes volleyball-spin { 0%{transform:rotate(0deg) scale(1)} 25%{transform:rotate(90deg) scale(1.08)} 50%{transform:rotate(180deg) scale(1)} 75%{transform:rotate(270deg) scale(1.08)} 100%{transform:rotate(360deg) scale(1)} }
.vball { width:22px; height:22px; flex-shrink:0; animation:volleyball-spin 3s linear infinite; filter:drop-shadow(0 1px 2px rgba(0,0,0,.18)); }
.pin-btn { background:var(--bg2); border:0.5px solid var(--border2); border-radius:var(--radius-lg); padding:14px; font-size:22px; font-weight:600; cursor:pointer; font-family:inherit; color:var(--text); transition:background .15s; }
.pin-btn:hover { background:var(--bg3); }
.pin-btn:active { transform:scale(.93); }
.acc-selected { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:6px; min-height:0; }
.acc-badge { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:13px; font-weight:500; cursor:pointer; user-select:none; }
.acc-badge.confirmed { background:var(--ok-bg); border:0.5px solid var(--ok-bdr); color:var(--ok-text); }
.acc-badge.payer { background:var(--warn-bg); border:0.5px solid var(--warn-bdr); color:var(--warn-text); }
.acc-trigger { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; background:var(--bg2); border:0.5px solid var(--border); border-radius:var(--radius-md); cursor:pointer; font-size:13px; user-select:none; transition:border-color .15s; }
.acc-trigger:hover { border-color:var(--border2); }
.acc-trigger.open { border-radius:var(--radius-md) var(--radius-md) 0 0; border-color:var(--border2); }
.acc-trigger-label { font-weight:500; color:var(--text); display:flex; align-items:center; gap:6px; }
.acc-arrow { transition:transform .2s; font-size:12px; color:var(--text2); }
.acc-trigger.open .acc-arrow { transform:rotate(180deg); }
.acc-dropdown { display:none; background:var(--bg2); border:0.5px solid var(--border2); border-top:none; border-radius:0 0 var(--radius-md) var(--radius-md); max-height:220px; overflow-y:auto; }
.acc-dropdown.open { display:block; }
.acc-item { display:flex; align-items:center; gap:10px; padding:8px 12px; border-bottom:0.5px solid var(--border); cursor:pointer; font-size:13px; user-select:none; transition:background .12s; }
.acc-item:last-child { border-bottom:none; }
.acc-item:hover { background:var(--bg3); }
.acc-item.active { color:var(--ok-text); font-weight:500; }
.acc-item.active-payer { color:var(--warn-text); font-weight:500; }
.acc-dot { width:8px; height:8px; border-radius:50%; border:1.5px solid var(--border2); flex-shrink:0; transition:all .12s; }
.acc-item.active .acc-dot { background:var(--ok-text); border-color:var(--ok-text); }
.acc-item.active-payer .acc-dot { background:var(--warn-text); border-color:var(--warn-text); }
@media (max-width:480px) { .header { padding:.75rem 1rem; } .body { padding:.75rem 1rem; } .app-title span { display:none; } }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-bg"></div>
    <div class="header-inner">
      <div class="header-top" style="margin-bottom:.5rem">
        <div class="app-title">
          <svg width="28" height="28" viewBox="0 0 100 100" style="flex-shrink:0;filter:drop-shadow(0 1px 3px rgba(0,0,0,.3))">
            <circle cx="50" cy="50" r="48" fill="#f5e030" stroke="#d4a800" stroke-width="2"/>
            <path d="M50,2 Q80,20 78,50 Q80,80 50,98 Q20,80 22,50 Q20,20 50,2Z" fill="white" opacity=".85"/>
            <path d="M2,50 Q20,30 50,32 Q80,30 98,50" fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
            <path d="M2,50 Q20,70 50,68 Q80,70 98,50" fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
          </svg>
          <span>Dupla de Domingo</span>
          <span class="sync-dot" style="background:rgba(255,255,255,.8)" title="Sincronizado em tempo real"></span>
        </div>
        <div class="header-actions">
          <button class="btn btn-sm" onclick="requirePin('managersModal')"><i class="ti ti-settings"></i> Cadastros</button>
          <button class="btn btn-primary btn-sm" onclick="requirePin('addGameModal')"><i class="ti ti-plus"></i> Novo jogo</button>
        </div>
      </div>
      <div class="month-nav" style="padding-bottom:.6rem">
        <button class="nav-btn" onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
        <span class="month-label" id="monthLabel">—</span>
        <button class="nav-btn" onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
    </div>
    <svg class="header-wave" viewBox="0 0 680 28" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,8 C80,24 160,0 240,14 C320,28 400,4 480,16 C560,28 640,8 680,12 L680,28 L0,28 Z" fill="var(--bg3)" opacity="1"/>
    </svg>
  </div>
  <div class="body">
    <div class="game-list" id="gameList">
      <div class="empty-month">
        <i class="ti ti-loader-2" style="animation:spin 1s linear infinite"></i>
        <p>Conectando...</p>
      </div>
    </div>
  </div>
</div>

<!-- Modal Novo Jogo -->
<div class="modal-bg" id="addGameModal">
  <div class="modal">
    <h2><i class="ti ti-calendar-plus"></i> Marcar jogo</h2>
    <div class="form-group"><label>Data</label><input type="date" id="gDate"></div>
    <div class="form-row">
      <div class="form-group"><label>Início</label><input type="time" id="gStart" value="16:00"></div>
      <div class="form-group"><label>Fim</label><input type="time" id="gEnd" value="18:00"></div>
    </div>
    <div class="form-group"><label>Quadra</label><select id="gVenue"><option value="">Selecionar quadra...</option></select></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('addGameModal')">Cancelar</button>
      <button class="btn btn-primary" onclick="addGame()">Marcar jogo</button>
    </div>
  </div>
</div>

<!-- Modal Cadastros -->
<div class="modal-bg" id="managersModal">
  <div class="modal">
    <h2><i class="ti ti-database"></i> Cadastros</h2>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('players')"><i class="ti ti-users"></i> Jogadores</button>
      <button class="tab-btn" onclick="switchTab('venues')"><i class="ti ti-map-pin"></i> Quadras</button>
    </div>
    <div class="tab-content active" id="tab-players">
      <div class="form-row" style="margin-bottom:.5rem">
        <div class="form-group" style="margin:0"><label>Nome</label><input type="text" id="pName" placeholder="Nome completo"></div>
        <div class="form-group" style="margin:0"><label>WhatsApp</label><input type="text" id="pContact" placeholder="(51) 9..."></div>
      </div>
      <div class="form-group"><label>Chave PIX</label><input type="text" id="pPix" placeholder="CPF, e-mail, telefone..."></div>
      <div style="text-align:right;margin-bottom:.75rem">
        <button class="btn btn-primary btn-sm" onclick="addPlayer()"><i class="ti ti-plus"></i> Adicionar jogador</button>
      </div>
      <div class="list-scroll" id="playersList"><p style="color:var(--text3);font-size:13px;text-align:center;padding:.5rem">Nenhum jogador ainda</p></div>
    </div>
    <div class="tab-content" id="tab-venues">
      <div class="form-group"><label>Nome da quadra</label><input type="text" id="vName" placeholder="Ex: Winge Sports"></div>
      <div class="form-group"><label>Endereço ou link Google Maps</label><textarea id="vAddress" placeholder="Cole o link do Maps ou o endereço completo"></textarea></div>
      <div style="text-align:right;margin-bottom:.75rem">
        <button class="btn btn-primary btn-sm" onclick="addVenue()"><i class="ti ti-plus"></i> Adicionar quadra</button>
      </div>
      <div class="list-scroll" id="venuesList"><p style="color:var(--text3);font-size:13px;text-align:center;padding:.5rem">Nenhuma quadra ainda</p></div>
    </div>
    <div class="modal-actions"><button class="btn" onclick="closeModal('managersModal')">Fechar</button></div>
  </div>
</div>

<!-- Modal WhatsApp -->
<div class="modal-bg" id="copyModal">
  <div class="modal">
    <h2><i class="ti ti-brand-whatsapp"></i> Copiar para WhatsApp</h2>
    <textarea class="copy-area" id="copyText" readonly></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('copyModal')">Fechar</button>
      <button class="btn btn-primary" id="copyBtn" onclick="doCopy()"><i class="ti ti-copy"></i> Copiar</button>
    </div>
  </div>
</div>

<!-- Modal PIN -->
<div class="modal-bg" id="pinModal">
  <div class="modal" style="max-width:320px;text-align:center">
    <h2 style="justify-content:center"><i class="ti ti-lock"></i> Senha de acesso</h2>
    <div id="pinDisplay" style="font-size:32px;letter-spacing:12px;font-weight:700;margin:1rem 0;min-height:48px;color:var(--text)">——————</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem">
      <button class="pin-btn" onclick="pinPress('1')">1</button>
      <button class="pin-btn" onclick="pinPress('2')">2</button>
      <button class="pin-btn" onclick="pinPress('3')">3</button>
      <button class="pin-btn" onclick="pinPress('4')">4</button>
      <button class="pin-btn" onclick="pinPress('5')">5</button>
      <button class="pin-btn" onclick="pinPress('6')">6</button>
      <button class="pin-btn" onclick="pinPress('7')">7</button>
      <button class="pin-btn" onclick="pinPress('8')">8</button>
      <button class="pin-btn" onclick="pinPress('9')">9</button>
      <button class="pin-btn pin-clear" onclick="pinClear()" style="font-size:18px">⌫</button>
      <button class="pin-btn" onclick="pinPress('0')">0</button>
      <button class="pin-btn" onclick="closeModal('pinModal')" style="font-size:12px;color:var(--text2)">Cancelar</button>
    </div>
    <div id="pinError" style="color:var(--danger-text);font-size:13px;min-height:20px"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }                              from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── Firebase ───────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyBaHMewuyReIt9U72PEIwA7iipg1ZTBIFE",
  authDomain:        "calendario-amelia-2202c.firebaseapp.com",
  databaseURL:       "https://calendario-amelia-2202c-default-rtdb.firebaseio.com",
  projectId:         "calendario-amelia-2202c",
  storageBucket:     "calendario-amelia-2202c.firebasestorage.app",
  messagingSenderId: "329381802500",
  appId:             "1:329381802500:web:9e6d1b7c9110478974fb51"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── estado local ───────────────────────────────────────────────
let players = [], venues = [], games = [];
let currentYear  = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let expandedGame = null;

// ── listeners tempo real ───────────────────────────────────────
onValue(ref(db, 'volei/players'), snap => {
  const val = snap.val() || {};
  players = Object.entries(val).map(([id,d]) => ({id,...d})).sort((a,b) => a.name.localeCompare(b.name));
  render();
});
onValue(ref(db, 'volei/venues'), snap => {
  const val = snap.val() || {};
  venues = Object.entries(val).map(([id,d]) => ({id,...d})).sort((a,b) => a.name.localeCompare(b.name));
  render();
});
onValue(ref(db, 'volei/games'), snap => {
  const val = snap.val() || {};
  games = Object.entries(val).map(([id,d]) => ({id,...d})).sort((a,b) => a.date.localeCompare(b.date));
  render();
});

// ── helpers ────────────────────────────────────────────────────
const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function showToast(msg, ms=1800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(d) { const [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; }
function fmtBRL(n) { return Number(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function parseBRL(s) { return parseFloat(String(s).replace(/\./g,'').replace(',','.')) || 0; }

// ── modais ─────────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-bg').forEach(m =>
  m.addEventListener('click', e => { if (e.target===m) m.classList.remove('open'); })
);
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active',['players','venues'][i]===tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
}
function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth>11) { currentMonth=0; currentYear++; }
  if (currentMonth<0)  { currentMonth=11; currentYear--; }
  render();
}

// ── render ─────────────────────────────────────────────────────
function render() {
  document.getElementById('monthLabel').textContent = `${MONTHS_PT[currentMonth]} ${currentYear}`;

  // select de quadras
  document.getElementById('gVenue').innerHTML =
    '<option value="">Selecionar quadra...</option>' +
    venues.map(v => `<option value="${v.id}">${esc(v.name)}</option>`).join('');

  // lista jogadores no modal
  const plEl = document.getElementById('playersList');
  plEl.innerHTML = players.length
    ? players.map(p => `<div class="list-item">
        <div>
          <div class="list-item-name">${esc(p.name)}</div>
          <div class="list-item-meta">${p.contact?'📱 '+esc(p.contact):''}${p.pix?' · PIX: '+esc(p.pix):''}</div>
        </div>
        <button class="btn btn-sm btn-danger" onclick="removePlayer('${p.id}')"><i class="ti ti-trash"></i></button>
      </div>`).join('')
    : '<p style="color:var(--text3);font-size:13px;text-align:center;padding:.5rem">Nenhum jogador ainda</p>';

  // lista quadras no modal
  const vEl = document.getElementById('venuesList');
  vEl.innerHTML = venues.length
    ? venues.map(v => `<div class="list-item">
        <div>
          <div class="list-item-name">${esc(v.name)}</div>
          <div class="list-item-meta">${esc(v.address||'')}</div>
        </div>
        <button class="btn btn-sm btn-danger" onclick="removeVenue('${v.id}')"><i class="ti ti-trash"></i></button>
      </div>`).join('')
    : '<p style="color:var(--text3);font-size:13px;text-align:center;padding:.5rem">Nenhuma quadra ainda</p>';

  // jogos do mês
  const monthGames = games.filter(g => {
    const [y,m] = g.date.split('-');
    return parseInt(y)===currentYear && parseInt(m)-1===currentMonth;
  });
  const listEl = document.getElementById('gameList');
  if (!monthGames.length) {
    listEl.innerHTML = `<div class="empty-month"><i class="ti ti-calendar-off"></i><p>Nenhum jogo em ${MONTHS_PT[currentMonth]}</p><p style="font-size:12px;margin-top:.5rem;color:var(--text3)">Clique em "+ Novo jogo" para marcar</p></div>`;
    return;
  }
  listEl.innerHTML = monthGames.map(g => renderGame(g)).join('');
  // restaurar split do card expandido
  if (expandedGame) {
    const g = monthGames.find(x => x.id===expandedGame);
    if (g) {
      const inp = document.getElementById('cost-input-'+expandedGame);
      if (inp && document.activeElement!==inp) inp.value = g.cost ? fmtBRL(g.cost) : '';
      renderSplit(g);
    }
  }
}

function renderGame(g) {
  const isExp = expandedGame === g.id;
  const confirmed = g.confirmed || [];
  const venue = venues.find(v => v.id===g.venueId);
  const payer = players.find(p => p.id===g.payerId);
  const addr = venue ? venue.address : '';
  const isLink = addr && (addr.startsWith('http://') || addr.startsWith('https://'));
  const venueLabel = isLink
    ? `<a href="${esc(addr)}" target="_blank" onclick="event.stopPropagation()">${esc(g.venueName)} <i class="ti ti-external-link" style="font-size:11px"></i></a>`
    : esc(g.venueName||'');

  let badges = `<span class="badge badge-blue"><i class="ti ti-users" style="font-size:10px"></i> ${confirmed.length} confirmado${confirmed.length!==1?'s':''}</span>`;
  if (payer) badges += `<span class="badge badge-amber"><i class="ti ti-credit-card" style="font-size:10px"></i> ${esc(payer.name)} pagou</span>`;
  if (g.cost) badges += `<span class="badge badge-green">R$ ${fmtBRL(g.cost)}</span>`;

  let detail = '';
  if (isExp) {
    const confirmedBadges = confirmed.map(pid => {
      const p = players.find(x => x.id===pid);
      return p ? `<span class="acc-badge confirmed" onclick="event.stopPropagation();toggleConfirm('${g.id}','${p.id}')" title="Clique para remover">✓ ${esc(p.name)}</span>` : '';
    }).join('');
    const presenceChips = players.length
      ? `<div class="acc-selected">${confirmedBadges}</div>
         <div class="acc-trigger" id="acc-p-${g.id}" onclick="event.stopPropagation();toggleAcc('acc-p-${g.id}','acc-pd-${g.id}')">
           <span class="acc-trigger-label"><i class="ti ti-users" style="font-size:12px;margin-right:4px"></i>Jogadores</span>
           <span class="acc-arrow">▼</span>
         </div>
         <div class="acc-dropdown" id="acc-pd-${g.id}">
           ${players.map(p => {
             const ok = confirmed.includes(p.id);
             return `<div class="acc-item${ok?' active':''}" onclick="event.stopPropagation();toggleConfirm('${g.id}','${p.id}')">
               <div class="acc-dot"></div>${esc(p.name)}
             </div>`;
           }).join('')}
         </div>`
      : '<p style="color:var(--text3);font-size:12px">Cadastre jogadores primeiro</p>';

    const payerBadge = g.payerId
      ? (() => { const pp = players.find(x => x.id===g.payerId); return pp ? `<span class="acc-badge payer" onclick="event.stopPropagation();setPayer('${g.id}','${pp.id}')" title="Clique para remover">★ ${esc(pp.name)}</span>` : ''; })()
      : '';
    const payerChips = players.length
      ? `<div class="acc-selected">${payerBadge}</div>
         <div class="acc-trigger" id="acc-w-${g.id}" onclick="event.stopPropagation();toggleAcc('acc-w-${g.id}','acc-wd-${g.id}')">
           <span class="acc-trigger-label"><i class="ti ti-credit-card" style="font-size:12px;margin-right:4px"></i>Selecionar pagador</span>
           <span class="acc-arrow">▼</span>
         </div>
         <div class="acc-dropdown" id="acc-wd-${g.id}">
           ${players.map(p => {
             const isPayer = g.payerId===p.id;
             return `<div class="acc-item${isPayer?' active-payer':''}" onclick="event.stopPropagation();setPayer('${g.id}','${p.id}')">
               <div class="acc-dot"></div>${esc(p.name)}
             </div>`;
           }).join('')}
         </div>`
      : '<p style="color:var(--text3);font-size:12px">Cadastre jogadores primeiro</p>';

    detail = `<div class="game-detail open" onclick="event.stopPropagation()">
      <div class="detail-section">
        <div class="detail-label">Confirmar presença</div>
        <div>${presenceChips}</div>
      </div>
      <div class="detail-section">
        <div class="detail-label">Quem pagou a quadra?</div>
        <div>${payerChips}</div>
      </div>
      <div class="detail-section">
        <div class="detail-label">Valor total da quadra (R$)</div>
        <input class="cost-input" type="text" inputmode="numeric" placeholder="0,00"
          id="cost-input-${g.id}"
          value="${g.cost ? fmtBRL(g.cost) : ''}"
          onclick="event.stopPropagation()"
          oninput="event.stopPropagation();onCostInput(event,'${g.id}')"
          onblur="saveCost('${g.id}')">
        <div class="split-result" id="split-${g.id}"></div>
      </div>
      <div class="copy-btns">
        <button class="btn btn-sm" onclick="event.stopPropagation();openCopy('${g.id}','game')"><i class="ti ti-brand-whatsapp"></i> Resumo do jogo</button>
        <button class="btn btn-sm" onclick="event.stopPropagation();openCopy('${g.id}','payment')"><i class="ti ti-receipt"></i> Divisão do valor</button>
      </div>
    </div>`;
  }

  return `<div class="game-card${isExp?' expanded':''}" onclick="toggleExpand('${g.id}')">
    <div class="game-header">
      <div class="game-info">
        <div class="game-date-line">
          <svg class="vball" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs><clipPath id="bc${g.id}"><circle cx="50" cy="50" r="47"/></clipPath></defs>
            <path d="M50,3 A47,47 0 0,0 3,50 A47,47 0 0,0 50,97 Q20,75 22,50 Q20,25 50,3 Z" fill="#1a5fa8" clip-path="url(#bc${g.id})"/>
            <path d="M50,3 A47,47 0 0,1 97,50 A47,47 0 0,1 50,97 Q80,75 78,50 Q80,25 50,3 Z" fill="#1a5fa8" clip-path="url(#bc${g.id})"/>
            <path d="M50,3 Q80,25 78,50 Q80,75 50,97 Q20,75 22,50 Q20,25 50,3 Z" fill="#f5e030" clip-path="url(#bc${g.id})"/>
            <path d="M22,50 Q20,25 50,3 Q35,25 36,50 Q35,75 50,97 Q20,75 22,50 Z" fill="white" opacity="0.9" clip-path="url(#bc${g.id})"/>
            <path d="M78,50 Q80,25 50,3 Q65,25 64,50 Q65,75 50,97 Q80,75 78,50 Z" fill="white" opacity="0.9" clip-path="url(#bc${g.id})"/>
            <circle cx="50" cy="50" r="47" fill="none" stroke="#b8970a" stroke-width="2"/>
          </svg>
          Jogo ${fmtDate(g.date)}
        </div>
        <div class="game-meta">
          <i class="ti ti-clock" style="font-size:12px"></i> ${g.start} às ${g.end}
          &nbsp;·&nbsp;
          <i class="ti ti-map-pin" style="font-size:12px"></i> ${venueLabel}
        </div>
        <div class="game-badges">${badges}</div>
      </div>
      <div class="game-actions-row" onclick="event.stopPropagation()">
        <button class="btn btn-sm" style="color:var(--text2)" onclick="toggleExpand('${g.id}')"><i class="ti ti-chevron-${isExp?'up':'down'}"></i></button>
        <button class="btn btn-sm btn-danger" onclick="requirePin('deleteGame','${g.id}')"><i class="ti ti-trash"></i></button>
      </div>
    </div>
    ${detail}
  </div>`;
}

// ── split ──────────────────────────────────────────────────────
function renderSplit(g) {
  const el = document.getElementById('split-'+g.id);
  if (!el) return;
  const cost = parseFloat(g.cost) || 0;
  const confirmed = g.confirmed || [];
  if (!cost || !confirmed.length) {
    el.innerHTML = '<p style="color:var(--text3);font-size:12px">Informe o valor e confirme presenças para calcular.</p>';
    return;
  }
  const per = cost / confirmed.length;
  el.innerHTML =
    `<div style="font-size:12px;color:var(--text2);margin-bottom:6px">R$ ${fmtBRL(cost)} ÷ ${confirmed.length} pessoas = <strong>R$ ${fmtBRL(per)} por pessoa</strong></div>` +
    confirmed.map(pid => {
      const p = players.find(x => x.id===pid);
      const isPayer = g.payerId===pid;
      const hasPaid = isPayer || (g.paid||[]).includes(pid);
      const chip = isPayer
        ? `<i class="ti ti-check" style="color:var(--ok-text);font-size:18px"></i>`
        : hasPaid
          ? `<i class="ti ti-check" onclick="event.stopPropagation();togglePaid('${g.id}','${pid}')" style="color:var(--ok-text);font-size:18px;cursor:pointer" title="Clique para desfazer"></i>`
          : `<button onclick="event.stopPropagation();togglePaid('${g.id}','${pid}')"
               style="background:var(--ok-bg);border:0.5px solid var(--ok-bdr);color:var(--ok-text);border-radius:20px;padding:3px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit">
               Pagar
             </button>`;
      return `<div class="split-row"><span class="sname">${esc(p?p.name:'?')}</span><span class="sval">${chip}</span></div>`;
    }).join('');
}

// ── ações jogadores / quadras ──────────────────────────────────
function addPlayer() {
  const name = document.getElementById('pName').value.trim();
  const contact = document.getElementById('pContact').value.trim();
  const pix = document.getElementById('pPix').value.trim();
  if (!name) return showToast('Informe o nome');
  push(ref(db,'volei/players'), {name,contact,pix}).then(() => {
    document.getElementById('pName').value = '';
    document.getElementById('pContact').value = '';
    document.getElementById('pPix').value = '';
    showToast('Jogador adicionado ✓');
  });
}
function removePlayer(id) {
  if (!confirm('Remover jogador?')) return;
  remove(ref(db,`volei/players/${id}`));
}
function addVenue() {
  const name = document.getElementById('vName').value.trim();
  const address = document.getElementById('vAddress').value.trim();
  if (!name) return showToast('Informe o nome da quadra');
  push(ref(db,'volei/venues'), {name,address}).then(() => {
    document.getElementById('vName').value = '';
    document.getElementById('vAddress').value = '';
    showToast('Quadra adicionada ✓');
  });
}
function removeVenue(id) {
  if (!confirm('Remover quadra?')) return;
  remove(ref(db,`volei/venues/${id}`));
}

// ── ações jogos ────────────────────────────────────────────────
function addGame() {
  const date = document.getElementById('gDate').value;
  const start = document.getElementById('gStart').value;
  const end = document.getElementById('gEnd').value;
  const venueId = document.getElementById('gVenue').value;
  if (!date) return showToast('Selecione a data');
  if (!venueId) return showToast('Selecione a quadra');
  const venue = venues.find(v => v.id===venueId);
  push(ref(db,'volei/games'), {
    date, start, end, venueId,
    venueName: venue ? venue.name : '',
    venueAddress: venue ? venue.address : '',
    confirmed: [], payerId: null, cost: '', paid: []
  }).then(() => {
    closeModal('addGameModal');
    const [y,m] = date.split('-');
    currentYear = parseInt(y); currentMonth = parseInt(m)-1;
    showToast('Jogo marcado ✓');
  });
}
function removeGame(id) {
  if (!confirm('Excluir este jogo?')) return;
  if (expandedGame===id) expandedGame = null;
  remove(ref(db,`volei/games/${id}`)).then(() => showToast('Jogo removido'));
}
function toggleExpand(id) {
  expandedGame = expandedGame===id ? null : id;
  render();
}
function toggleConfirm(gameId, playerId) {
  const g = games.find(x => x.id===gameId); if (!g) return;
  const arr = [...(g.confirmed||[])];
  const idx = arr.indexOf(playerId);
  if (idx>=0) arr.splice(idx,1); else arr.push(playerId);
  update(ref(db,`volei/games/${gameId}`), {confirmed: arr});
}
function setPayer(gameId, playerId) {
  const g = games.find(x => x.id===gameId); if (!g) return;
  const newPayer = g.payerId===playerId ? null : playerId;
  update(ref(db,`volei/games/${gameId}`), {payerId: newPayer});
}
function togglePaid(gameId, playerId) {
  const g = games.find(x => x.id===gameId); if (!g) return;
  const paid = [...(g.paid||[])];
  const idx = paid.indexOf(playerId);
  if (idx>=0) paid.splice(idx,1); else paid.push(playerId);
  update(ref(db,`volei/games/${gameId}`), {paid});
}
function onCostInput(event, gameId) {
  const g = games.find(x => x.id===gameId); if (!g) return;
  g.cost = parseBRL(event.target.value) || '';
  renderSplit(g);
}
function saveCost(gameId) {
  const inp = document.getElementById('cost-input-'+gameId); if (!inp) return;
  const val = parseBRL(inp.value);
  inp.value = val ? fmtBRL(val) : '';
  update(ref(db,`volei/games/${gameId}`), {cost: val||''});
  const g = games.find(x => x.id===gameId);
  if (g) { g.cost = val||''; renderSplit(g); }
}

// ── whatsapp ───────────────────────────────────────────────────
function openCopy(gameId, type) {
  const g = games.find(x => x.id===gameId); if (!g) return;
  const confirmedPlayers = (g.confirmed||[]).map(pid => players.find(p => p.id===pid)).filter(Boolean);
  const payer = players.find(p => p.id===g.payerId);
  const venue = venues.find(v => v.id===g.venueId);
  const cost = parseFloat(g.cost)||0;
  const per = confirmedPlayers.length ? cost/confirmedPlayers.length : 0;
  let txt = '';
  if (type==='game') {
    txt = `🏐 *JOGO DE VÔLEI*\n📅 ${fmtDate(g.date)} — ${g.start} às ${g.end}\n📍 ${g.venueName}`
        + (venue&&venue.address ? `\n🗺 ${venue.address}` : '')
        + `\n\n✅ *Confirmados (${confirmedPlayers.length}):*\n`
        + (confirmedPlayers.length ? confirmedPlayers.map((p,i)=>`${i+1}. ${p.name}`).join('\n') : 'Ninguém ainda')
        + `\n\n👆 Confirme sua presença:\nhttps://raphaelkleinc.github.io/voleidupla/`;
  } else {
    txt = `💰 *DIVISÃO DA QUADRA*\n📅 ${fmtDate(g.date)} — ${g.venueName}\n\n`
        + `💳 Total: R$ ${fmtBRL(cost)} ÷ ${confirmedPlayers.length} pessoas = *R$ ${fmtBRL(per)} por pessoa*\n`
        + (payer ? `\n🏦 *Pagar para: ${payer.name}*\n${payer.pix?'PIX: `'+payer.pix+'`':''}` : '')
        + `\n\n📋 *Lista:*\n`
        + confirmedPlayers.map(p => {
            if (g.payerId===p.id) return `• ${p.name}: pagou a quadra 🏦`;
            const quitou = (g.paid||[]).includes(p.id);
            return `• ${p.name}: R$ ${fmtBRL(per)}${quitou?' ✓ quitou':''}`;
          }).join('\n');
  }
  document.getElementById('copyText').value = txt;
  openModal('copyModal');
}
function doCopy() {
  const t = document.getElementById('copyText'); t.select();
  try { document.execCommand('copy'); } catch { navigator.clipboard.writeText(t.value); }
  showToast('Copiado ✓');
  const btn = document.getElementById('copyBtn');
  btn.innerHTML = '<i class="ti ti-check"></i> Copiado!';
  setTimeout(() => { btn.innerHTML = '<i class="ti ti-copy"></i> Copiar'; }, 1800);
}

// ── PIN ───────────────────────────────────────────────────────
const PIN_CORRECT = '465689';
let pinBuffer = '';
let pinTarget = null;
let pinTargetId = null;

function requirePin(target, id='') {
  pinBuffer = '';
  pinTarget = target;
  pinTargetId = id;
  document.getElementById('pinDisplay').textContent = '——————';
  document.getElementById('pinError').textContent = '';
  openModal('pinModal');
}
function pinPress(digit) {
  if (pinBuffer.length >= 6) return;
  pinBuffer += digit;
  document.getElementById('pinDisplay').textContent =
    '●'.repeat(pinBuffer.length) + '—'.repeat(6 - pinBuffer.length);
  if (pinBuffer.length === 6) {
    setTimeout(() => {
      if (pinBuffer === PIN_CORRECT) {
        closeModal('pinModal');
        if (pinTarget === 'deleteGame') {
          removeGame(pinTargetId);
        } else {
          openModal(pinTarget);
        }
      } else {
        document.getElementById('pinError').textContent = 'Senha incorreta. Tente novamente.';
        document.getElementById('pinDisplay').style.color = 'var(--danger-text)';
        setTimeout(() => {
          pinBuffer = '';
          document.getElementById('pinDisplay').textContent = '——————';
          document.getElementById('pinDisplay').style.color = 'var(--text)';
          document.getElementById('pinError').textContent = '';
        }, 900);
      }
    }, 120);
  }
}
function pinClear() {
  pinBuffer = pinBuffer.slice(0, -1);
  document.getElementById('pinDisplay').textContent =
    '●'.repeat(pinBuffer.length) + '—'.repeat(6 - pinBuffer.length);
  document.getElementById('pinError').textContent = '';
  document.getElementById('pinDisplay').style.color = 'var(--text)';
}

function toggleAcc(triggerId, dropdownId) {
  const trigger  = document.getElementById(triggerId);
  const dropdown = document.getElementById(dropdownId);
  if (!trigger || !dropdown) return;
  const isOpen = dropdown.classList.contains('open');
  // close all other accordions first
  document.querySelectorAll('.acc-trigger.open').forEach(t => t.classList.remove('open'));
  document.querySelectorAll('.acc-dropdown.open').forEach(d => d.classList.remove('open'));
  if (!isOpen) {
    trigger.classList.add('open');
    dropdown.classList.add('open');
  }
}

// ── expor ao window para onclick= no HTML ──────────────────────
Object.assign(window, {
  changeMonth, openModal, closeModal, switchTab,
  requirePin, pinPress, pinClear, toggleAcc,
  addPlayer, removePlayer, addVenue, removeVenue,
  addGame, removeGame, toggleExpand, toggleConfirm,
  setPayer, togglePaid, onCostInput, saveCost,
  openCopy, doCopy
});

// ── init ───────────────────────────────────────────────────────
document.getElementById('gDate').value = new Date().toISOString().split('T')[0];
document.getElementById('monthLabel').textContent = MONTHS_PT[currentMonth] + ' ' + new Date().getFullYear();
</script>
